<div class="container p-4">
  <h1>Welcome to ngid-table Tutorial</h1>
  <h4>Create resuable table component with Angular</h4>
  <br />
  <ngid-table [model]="tableModel" stringUrl="http://localhost:3000/users">
    <ng-template #headerFilter let-modal>
      <form [formGroup]="formGroup">
        <div class="form-group">
          <select
            id="userStatus"
            class="form-select"
            aria-label="Default select example"
            formControlName="status"
          >
            <option [value]="null">Select User Status</option>
            <option value="SUBMITTED">Submitted</option>
            <option value="WAITING">Waiting</option>
            <option value="APPROVED">Approved</option>
          </select>
        </div>
        <div class="d-flex justify-content-end mt-4">
          <button
            class="btn btn-secondary me-2"
            (click)="modal.close(); handleReset()"
          >
            Reset
          </button>
          <button
            class="btn btn-primary"
            (click)="modal.close(); handleFilter()"
          >
            Filter
          </button>
        </div>
      </form>
    </ng-template>

    <ng-template #headerButtons>
      <button class="btn btn-primary">
        <em class="fas fa-plus"></em>
        Add
      </button>
    </ng-template>

    <ng-template #actionButtons let-record>
      <button class="btn btn-primary btn-sm" (click)="handleView(record)">
        <em class="fas fa-search"></em>
      </button>
      <button class="btn btn-warning btn-sm" (click)="handleEdit(record)">
        <em class="fas fa-pen-alt"></em>
      </button>
      <button class="btn btn-danger btn-sm" (click)="handleDelete(record)">
        <em class="fas fa-trash"></em>
      </button>
    </ng-template>
  </ngid-table>
  <br />
  <br />
  <!-- <ngid-table
    [model]="tablePostModel"
    stringUrl="http://localhost:3000/posts"
  ></ngid-table> -->
</div>
