<div class="ngid-table">
  <div class="ngid-table-header">
    <div class="input-group input-search">
      <span class="input-group-text">
        <em class="fas fa-filter"></em>
      </span>
      <span class="input-group-text">
        <em class="fas fa-search"></em>
      </span>
      <input
        type="text"
        class="form-control"
        placeholder="Search"
        aria-label="search"
        aria-describedby="basic-addon1"
        (input)="handleSearch($event)"
      />
    </div>
  </div>
  <div class="ngid-table-body">
    <div class="table-responsive">
      <table class="table ngid-table">
        <thead>
          <tr>
            <th>
              <div class="th-content">
                <span class="th-text"> No </span>
                <!-- <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [id]="0"
                      [indeterminate]="true"
                    />
                    <label class="form-check-label" [for]="0"> </label>
                  </div> -->
              </div>
            </th>
            <!-- <th class="sortable sort-asc"> -->
            <th
              [ngClass]="[
                column.sortable ? 'sortable' : '',
                state.sortField === column.model.field && state.sortOrder
                  ? 'sort-' + (state.sortOrder | lowercase)
                  : ''
              ]"
              *ngFor="let column of state.columns"
              (click)="column.sortable && handleSort(column)"
            >
              <div class="th-content">
                <span class="th-text">{{ column.model.header }}</span>
                <em class="fas fa-sort" *ngIf="column.sortable"></em>
              </div>
            </th>
            <th class="th-action" *ngIf="actionButtonsTmpl">
              <div class="th-content">
                <span class="th-text"> Action </span>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of state.rows; let i = index">
            <td>
              <div class="td-content">
                {{ i + 1 }}
                <!-- <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [id]="item + 1"
                    />
                    <label class="form-check-label" [for]="item + 1"> </label>
                  </div> -->
              </div>
            </td>
            <td *ngFor="let column of row.columns">
              <div class="td-content">
                <div class="td-text">
                  {{ column.value }}
                </div>
              </div>
            </td>
            <td class="td-action" *ngIf="actionButtonsTmpl">
              <div class="td-content">
                <ng-container
                  *ngTemplateOutlet="
                    actionButtonsTmpl;
                    context: { $implicit: row.model.record }
                  "
                ></ng-container>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="ngid-table-footer">
    <div class="footer-left">
      <select
        class="form-select"
        aria-label="Default select example"
        style="width: 70px"
        (change)="handleChangePerPage($event)"
      >
        <option
          [value]="perPage"
          *ngFor="let perPage of state.perPages"
          [selected]="perPage === state.perPage"
        >
          {{ perPage }}
        </option>
      </select>
    </div>
    <div class="footer-right">
      <ngb-pagination
        [collectionSize]="120"
        [page]="1"
        [maxSize]="5"
        [boundaryLinks]="true"
      ></ngb-pagination>
    </div>
  </div>
</div>
