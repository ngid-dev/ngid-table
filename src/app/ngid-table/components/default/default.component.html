<div class="ngid-table">
  <div class="ngid-table-header">
    <div class="input-group input-search">
      <span
        class="input-group-text"
        *ngIf="headerFilterTmpl"
        (click)="handleShowFilter()"
      >
        <em class="fas fa-filter"></em>
      </span>
      <span class="input-group-text">
        <em class="fas fa-search"></em>
      </span>
      <input
        type="text"
        class="form-control"
        placeholder="Search"
        aria-label="search"
        aria-describedby="basic-addon1"
        (input)="handleSearch($event)"
      />
    </div>
  </div>
  <div class="ngid-table-body">
    <div class="ngid-loader" *ngIf="state.isLoading">
      <div class="loadingio-spinner-ripple-ccobe1g0m4w">
        <div class="ldio-h748mykorlm">
          <div></div>
          <div></div>
        </div>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table ngid-table">
        <thead>
          <tr *ngFor="let column of state.columnsList; let i = index">
            <th
              class="th-no"
              [attr.rowspan]="state.columnsList.length"
              *ngIf="i === 0"
            >
              <div class="th-content">
                <span class="th-text"> No </span>
                <!-- <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [id]="0"
                      [indeterminate]="true"
                    />
                    <label class="form-check-label" [for]="0"> </label>
                  </div> -->
              </div>
            </th>
            <!-- <th class="sortable sort-asc"> -->
            <th
              [ngClass]="[
                c.sortable && !c.model.childrens ? 'sortable' : '',
                state.sortField === c.model.field && state.sortOrder
                  ? 'sort-' + (state.sortOrder | lowercase)
                  : ''
              ]"
              *ngFor="let c of column"
              (click)="handleSort(c)"
              [attr.colspan]="c.model.childrens ? c.model.childrens.length : 1"
              [attr.rowspan]="
                c.model.childrens ? 1 : state.columnsList.length - i
              "
            >
              <div
                class="th-content"
                [ngClass]="c.model.childrens ? 'justify-content-center' : ''"
              >
                <span class="th-text">{{ c.model.header }}</span>
                <em
                  class="fas fa-sort"
                  *ngIf="c.sortable && !c.model.childrens"
                ></em>
              </div>
            </th>
            <th
              class="th-action"
              *ngIf="actionButtonsTmpl && i === 0"
              [attr.rowspan]="state.columnsList.length"
            >
              <div class="th-content">
                <span class="th-text"> Action </span>
              </div>
            </th>
          </tr>
        </thead>
        <tbody>
          <tr
            class="tr-not-found"
            *ngIf="!state.isLoading && state.rows.length === 0"
          >
            <td colspan="9999" class="text-center">
              <div class="not-found-wrapper">
                <h5>Data Not Found</h5>
                <p class="text-secondary" *ngIf="!state.keywords">
                  Please add new data
                </p>
                <p class="text-secondary" *ngIf="state.keywords">
                  Search result for: '{{ state.keywords }}' not found!
                </p>
              </div>
            </td>
          </tr>
          <tr *ngFor="let row of state.rows; let i = index">
            <td>
              <div class="td-content">
                {{ row.position }}
                <!-- <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      [id]="item + 1"
                    />
                    <label class="form-check-label" [for]="item + 1"> </label>
                  </div> -->
              </div>
            </td>
            <td *ngFor="let column of row.columns">
              <div class="td-content" tdContent [column]="column"></div>
            </td>
            <td class="td-action" *ngIf="actionButtonsTmpl">
              <div class="td-content">
                <ng-container
                  *ngTemplateOutlet="
                    actionButtonsTmpl;
                    context: { $implicit: row.model.record }
                  "
                ></ng-container>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="ngid-table-footer">
    <div class="footer-left">
      <select
        class="form-select"
        aria-label="Default select example"
        style="width: 70px"
        (change)="handleChangePerPage($event)"
      >
        <option
          [value]="perPage"
          *ngFor="let perPage of state.perPages"
          [selected]="perPage === state.pagination.perPage"
        >
          {{ perPage }}
        </option>
      </select>
    </div>
    <div class="footer-right">
      <ngb-pagination
        [collectionSize]="state.pagination.totalRecord"
        [page]="state.pagination.page"
        [pageSize]="state.pagination.perPage"
        [maxSize]="5"
        [boundaryLinks]="true"
        (pageChange)="handleChangePage($event)"
      ></ngb-pagination>
    </div>
  </div>
</div>
