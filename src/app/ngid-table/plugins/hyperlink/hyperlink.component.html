<table-value-wrapper [value]="pluginData.column.value">
  <a
    [href]="attribute.href || '#'"
    (click)="handleClick($event)"
    [target]="attribute.target || '_blank'"
    [type]="attribute.type || ''"
    [rel]="attribute.rel || ''"
    [attr.referrerpolicy]="attribute.referrerpolicy || 'no-referrer'"
    [ping]="attribute.ping || ''"
    [attr.media]="attribute.media || ''"
    [hreflang]="attribute.hreflang || 'id'"
    [download]="attribute.download || ''"
  >
    {{ pluginData.column.value }}
    <em class="fas fa-external-link ms-1" *ngIf="href"></em>
  </a>
</table-value-wrapper>
